name: Fetch Aramusique Events

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'
jobs:
  artsdata-fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "fetch-push"
          artifact: "aramusique-org"
          publisher: "${{ secrets.PUBLISHER_URI_GREGORY }}"
          downloadFile: "output/aramusique-events.jsonld"
          page-url: "https://www.aramusique.org/calendrier"
          entity-identifier: "a.eventlist-button"
          token: "${{ secrets.GITHUB_TOKEN }}"
          cloudflare-private-key: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
