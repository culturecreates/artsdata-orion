name: Fetch Google KG Agents

on:
  workflow_dispatch:
      
jobs:

  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.14'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r src/google-kg/requirements.txt

      - name: Create .env file
        run: |
          echo "GOOGLE_KG_API_KEY=${{ secrets.GOOGLE_KG_API_KEY }}" > src/google-kg/.env

      - name: Fetch data
        run: python ./src/google-kg/main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git pull
          git add "output/google-kg-entities.ttl"
          git commit -m "Added google-kg-entities generated."
          git push

  artsdata-push:
    runs-on: ubuntu-latest
    needs: fetch-and-push
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "push"
          artifact: "google-kg"
          publisher: "${{ secrets.PUBLISHER_URI_GREGORY }}"
          downloadUrl: "https://raw.githubusercontent.com/${{github.repository}}/${{github.ref_name}}/output/google-kg-entities.ttl"