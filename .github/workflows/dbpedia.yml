name: Fetch DBpedia Entities

on:
  workflow_dispatch:
      
jobs:

  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.14'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r src/dbpedia/requirements.txt

      - name: Fetch data
        run: python ./src/dbpedia/main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          git lfs install
          
          git lfs track "output/dbpedia-entities.ttl"
          
          git add .gitattributes
          
          git pull --rebase
          
          git add "output/dbpedia-entities.ttl"
          git commit -m "Added dbpedia-entities generated."
          
          git commit -m "Added dbpedia-entities generated via LFS."
          git push

  artsdata-push:
    runs-on: ubuntu-latest
    needs: fetch-and-push
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "push"
          artifact: "dbpedia"
          publisher: "${{ secrets.PUBLISHER_URI_GREGORY }}"
          # CRITICAL: raw.githubusercontent.com only returns the LFS pointer (a few bytes).
          # Use the media URL format below to download the actual 200MB+ object file from LFS storage.
          downloadUrl: "https://github.com/${{ github.repository }}/media/${{ github.ref_name }}/output/dbpedia-entities.ttl"