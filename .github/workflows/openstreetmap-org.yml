name: Fetch Open Street Map Places

on:
  workflow_dispatch:
      
jobs:

  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.14'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r src/osm/requirements.txt

      - name: Fetch data
        run: python ./src/osm/main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git pull
          git add "output/osm-places.ttl"
          git commit -m "Added osm places generated."
          git push

  artsdata-push:
    runs-on: ubuntu-latest
    needs: fetch-and-push
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "push"
          artifact: "openstreetmap-org"
          publisher: "${{ secrets.PUBLISHER_URI_GREGORY }}"
          downloadUrl: "https://raw.githubusercontent.com/${{github.repository}}/${{github.ref_name}}/output/osm-places.ttl"