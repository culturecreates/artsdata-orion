name: Fetch Music Brainz Artists

on:
  workflow_dispatch:
      
jobs:

  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.14'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r src/music-brainz/requirements.txt

      - name: Fetch data
        run: python ./src/music-brainz/main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git pull
          git add "output/music-brainz-artists.ttl"
          # Only commit and push if there are actual modified or new files staged
          if ! git diff --cached --quiet; then
            git commit -m "Added music-brainz artists generated."
            git push
          else
            echo "No changes detected in music-brainz-artists.ttl. Skipping commit."
          fi

  artsdata-push:
    runs-on: ubuntu-latest
    needs: fetch-and-push
    steps:
      - name: Action setup
        uses: culturecreates/artsdata-pipeline-action@v4
        with:
          mode: "push"
          artifact: "musicbrainz-org"
          publisher: "${{ secrets.PUBLISHER_URI_GREGORY }}"
          downloadUrl: "https://raw.githubusercontent.com/${{github.repository}}/${{github.ref_name}}/output/music-brainz-artists.ttl"